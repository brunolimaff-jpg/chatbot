name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 21
          cache: npm

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Structure
        run: npm run check:structure

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Enforce HANDOFF update on PR
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          CHANGED_FILES="$(git diff --name-only "origin/${{ github.base_ref }}"...HEAD)"
          echo "$CHANGED_FILES"
          echo "$CHANGED_FILES" | grep -q '^HANDOFF.md$' || (echo "HANDOFF.md must be updated in every PR." && exit 1)
